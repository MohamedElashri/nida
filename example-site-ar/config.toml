base_url = "https://arabic.nida.blog"
title = "مدونة نداء"
description = "مثال عربي بسيط لموقع مبني باستخدام nida."
language = "ar"
author = "Mohamed Elashri"
config_version = "0.4"

content_dir = "content"
template_dir = "templates"
static_dir = "static"
output_dir = "public"

paginate = 10
drafts = false
syntax_theme = "github"

[[taxonomies]]
name = "tags"
path = "tags"
render = false

[[taxonomies]]
name = "categories"
path = "categories"
render = false

[rss]
enabled = true
filename = "rss.xml"
limit = 20

[sitemap]
enabled = true
filename = "sitemap.xml"

[server]
host = "127.0.0.1"
port = 1307
livereload = true

[permalinks]
posts = "/posts/{slug}/"
pages = "/{slug}/"
