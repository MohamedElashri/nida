base_url = "https://nida.blog"
title = "Nida Journal"
description = "Notes on building a calm, focused publishing workflow with Nida."
language = "en"
author = "Mohamed Elashri"

content_dir = "content"
template_dir = "templates"
static_dir = "static"
output_dir = "public"

posts_dir = "posts"
pages_dir = "pages"

paginate = 10
drafts = false
syntax_theme = "github"

[taxonomies]
tags = true
categories = true

[rss]
enabled = true
filename = "rss.xml"
limit = 20

[sitemap]
enabled = true
filename = "sitemap.xml"

[server]
host = "127.0.0.1"
port = 1307
livereload = true

[permalinks]
posts = "/posts/{slug}/"
pages = "/{slug}/"
tags = "/tags/{slug}/"
categories = "/categories/{slug}/"
